- name: Set target and credential
  set_fact:
    target: "{{ item[0] }}"
    cred: "{{ item[1] }}"

- name: Attempt WinRM login
  ansible.builtin.shell: |
    timeout 10 bash -c '
    echo "{{ cred.password }}" | kinit {{ cred.username }}@CDT.LOCAL -
    python3 -c "
    import winrm, sys
    try:
        s = winrm.Session(
            \"http://{{ target.ip }}:5985/wsman\",
            auth=(\"{{ cred.username }}@CDT.LOCAL\", \"{{ cred.password }}\"),
            transport=\"kerberos\"
        )
        r = s.run_cmd(\"echo SUCCESS\")
        print(r.std_out.decode())
        sys.exit(0 if r.status_code == 0 else 1)
    except winrm.exceptions.InvalidCredentialsError:
        print(\"AUTH_FAILED\", file=sys.stderr)
        sys.exit(1)
    except ConnectionError:
        print(\"UNREACHABLE\", file=sys.stderr)
        sys.exit(2)
    except Exception as e:
        print(f\"FAILED: {e}\", file=sys.stderr)
        sys.exit(3)
    "
    kdestroy
    '
  async: 15
  poll: 5
  register: winrm_result
  ignore_errors: true

- name: Determine result
  set_fact:
    login_status: "{{ 'SUCCESS' if winrm_result['rc'] == 0
      else 'AUTH_FAILED' if 'AUTH_FAILED' in winrm_result['stderr']
      else 'UNREACHABLE' if 'UNREACHABLE' in winrm_result['stderr']
      else 'TIMEOUT' if winrm_result['rc'] == 124
      else 'FAILED' }}"

- name: Append to report
  ansible.builtin.lineinfile:
    path: "{{ report_file }}"
    line: "{{ target.name }} ({{ target.ip }}) | {{ cred.username }} | {{ cred.password }} | {{ login_status }}"
    create: yes