---
- name: Setup Anonymous Telnet Lab Vulnerability
  hosts: blue_linux_members
  become: yes
  vars:
    telnet_root_dir: /srv/telnet
    telnet_user: telnet
    telnet_password: ""   # empty for anonymous login

  tasks:

    - name: Install Telnet server
      apt:
        name: telnetd
        state: present
        update_cache: yes

    - name: Ensure telnet user exists
      user:
        name: "{{ telnet_user }}"
        shell: /bin/bash
        home: "{{ telnet_root_dir }}"
        create_home: yes
        password: "{{ telnet_password | password_hash('sha512') }}"
        state: present

    - name: Create Telnet root directory
      file:
        path: "{{ telnet_root_dir }}"
        state: directory
        owner: "{{ telnet_user }}"
        group: "{{ telnet_user }}"
        mode: "0755"

    - name: Allow anonymous login for telnet
      lineinfile:
        path: /etc/inetd.conf
        regexp: '^telnet'
        line: "telnet stream tcp nowait telnetd {{ telnet_user }} /usr/sbin/tcpd /usr/sbin/in.telnetd"
        state: present

    - name: Restart inetd to apply Telnet configuration
      service:
        name: openbsd-inetd
        state: restarted
        enabled: yes

    - name: Add Telnet welcome banner
      copy:
        dest: "{{ telnet_root_dir }}/motd"
        content: "Welcome to the totally secure Telnet!\n"
        owner: "{{ telnet_user }}"
        group: "{{ telnet_user }}"
        mode: "0644"