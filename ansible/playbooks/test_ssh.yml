- name: Set target and credential
  set_fact:
    target: "{{ item.0 }}"
    cred: "{{ item.1 }}"

- name: Attempt SSH login
  ansible.builtin.shell: |
    sshpass -p "{{ cred.password }}" \
    ssh -o StrictHostKeyChecking=no \
        -o UserKnownHostsFile=/dev/null \
        -o ConnectTimeout=5 \
        -J {{ jump_host }} \
        {{ cred.username }}@{{ target.ip }} \
        "echo SUCCESS"
  register: ssh_result
  ignore_errors: true

- name: Determine result
  set_fact:
    login_status: >-
      {% if ssh_result.rc == 0 %}
      SUCCESS
      {% elif 'Permission denied' in ssh_result.stderr %}
      AUTH_FAILED
      {% elif 'Connection timed out' in ssh_result.stderr %}
      TIMEOUT
      {% elif 'No route to host' in ssh_result.stderr %}
      UNREACHABLE
      {% else %}
      FAILED
      {% endif %}

- name: Append to report
  ansible.builtin.lineinfile:
    path: "{{ report_file }}"
    line: "{{ target.name }} ({{ target.ip }}) | {{ cred.username }} | {{ cred.password }} | {{ login_status }}"
    create: yes